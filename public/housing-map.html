<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #f8f8f6; }
    #map { width: 100%; height: 100%; }
    .city-label {
      background: transparent; border: none;
      font-family: Arial, sans-serif; font-size: 10px;
      color: rgba(0,0,0,0.38); font-weight: 700;
      letter-spacing: 0.07em; pointer-events: none;
      white-space: nowrap; text-transform: uppercase;
    }
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.75) !important;
      color: #999 !important;
    }
    .leaflet-control-attribution a { color: #bbb !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var mapInstance = null;
    var markerGroup = null;

    /* ── Send event to parent React app ─────────────────────────── */
    function notify(data) {
      try { window.parent.postMessage(JSON.stringify(data), '*'); } catch(e) {}
    }

    /* ── (Re)initialise the map with fresh data ──────────────────── */
    function initMap(cities, roommates, apts, filter) {

      /* Create map once */
      if (!mapInstance) {
        mapInstance = L.map('map', {
          center: [51.0, 9.0], zoom: 4,
          zoomControl: false, scrollWheelZoom: true,
        });
        L.control.zoom({ position: 'topright' }).addTo(mapInstance);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
          subdomains: 'abcd', maxZoom: 19,
        }).addTo(mapInstance);
        markerGroup = L.layerGroup().addTo(mapInstance);
      } else {
        markerGroup.clearLayers();
      }

      /* ── City labels + ghost dots ──────────────────────────────── */
      cities.forEach(function(city) {
        /* City name label */
        var labelIcon = L.divIcon({
          className: 'city-label',
          html: city.name,
          iconAnchor: [-7, -1],
        });
        markerGroup.addLayer(
          L.marker([city.lat, city.lng], { icon: labelIcon, interactive: false })
        );

        /* Ghost dot for cities with no visible pins */
        var hasRoommates = roommates.some(function(r) { return r.city === city.name; });
        var hasApts      = apts.some(function(a)      { return a.city === city.name; });
        var needsGhost   = (filter === 'roommates'  && !hasRoommates)
                        || (filter === 'apartments' && !hasApts)
                        || (filter === 'all'        && !hasRoommates && !hasApts);

        if (!needsGhost) return;

        var ghostIcon = L.divIcon({
          className: '',
          html: '<div style="width:10px;height:10px;background:rgba(0,0,0,0.12);border:1.5px solid rgba(0,0,0,0.22);border-radius:50%;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background=\'rgba(0,0,0,0.28)\';this.style.transform=\'scale(1.3)\'" onmouseout="this.style.background=\'rgba(0,0,0,0.12)\';this.style.transform=\'scale(1)\'"></div>',
          iconSize: [10, 10], iconAnchor: [5, 5],
        });
        var ghost = L.marker([city.lat, city.lng], { icon: ghostIcon });
        ghost.on('click', function() {
          notify({
            type: 'pin-click', pinType: 'city',
            cityName: city.name, cityFlag: city.flag, cityCountry: city.country,
            roommateCount: city.roommateCount, apartmentCount: city.apartmentCount,
          });
        });
        markerGroup.addLayer(ghost);
      });

      /* ── Blue pins: Roommate seekers ────────────────────────────── */
      roommates.forEach(function(r) {
        var bluePin = L.divIcon({
          className: '',
          html: '<div style="width:16px;height:16px;background:#6B9FFF;border:2.5px solid rgba(255,255,255,0.9);border-radius:50%;box-shadow:0 0 0 3px rgba(107,159,255,0.35),0 3px 10px rgba(0,0,0,0.5);cursor:pointer;transition:transform 0.15s;" onmouseover="this.style.transform=\'scale(1.3)\'" onmouseout="this.style.transform=\'scale(1)\'"></div>',
          iconSize: [16, 16], iconAnchor: [8, 8],
        });
        var m = L.marker([r.lat, r.lng], { icon: bluePin });
        m.on('click', function() {
          notify({ type: 'pin-click', pinType: 'roommate', id: r.id });
        });
        markerGroup.addLayer(m);
      });

      /* ── Red pins: Apartment listings ───────────────────────────── */
      apts.forEach(function(a) {
        var redPin = L.divIcon({
          className: '',
          html: '<div style="width:16px;height:16px;background:#F87171;border:2.5px solid rgba(255,255,255,0.9);border-radius:50%;box-shadow:0 0 0 3px rgba(248,113,113,0.35),0 3px 10px rgba(0,0,0,0.5);cursor:pointer;transition:transform 0.15s;" onmouseover="this.style.transform=\'scale(1.3)\'" onmouseout="this.style.transform=\'scale(1)\'"></div>',
          iconSize: [16, 16], iconAnchor: [8, 8],
        });
        var m = L.marker([a.lat, a.lng], { icon: redPin });
        m.on('click', function() {
          notify({ type: 'pin-click', pinType: 'apartment', id: a.id });
        });
        markerGroup.addLayer(m);
      });
    }

    /* ── Listen for data sent by HousingMap.tsx ─────────────────── */
    window.addEventListener('message', function(e) {
      try {
        var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (data && data.type === 'init-map') {
          initMap(data.cities, data.roommates, data.apts, data.filter);
        }
      } catch(err) {}
    });

    /* ── Tell the parent we're ready ────────────────────────────── */
    notify({ type: 'map-ready' });
  </script>
</body>
</html>
