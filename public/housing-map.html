<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #eef1f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    #map { width: 100%; height: 100%; background: #eef1f5; }

    /* Softly desaturate the base tiles so the coloured pins pop */
    .leaflet-tile-pane { filter: saturate(0.9) contrast(1.02); }

    .city-label {
      background: transparent; border: none;
      font-size: 10px; color: rgba(30,41,59,0.5);
      font-weight: 700; letter-spacing: 0.08em;
      pointer-events: none; white-space: nowrap; text-transform: uppercase;
      text-shadow: 0 1px 2px rgba(255,255,255,0.9), 0 0 3px rgba(255,255,255,0.9);
    }

    /* Rounded, floating zoom control */
    .leaflet-control-zoom {
      border: none !important;
      border-radius: 12px !important;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
    }
    .leaflet-control-zoom a {
      width: 32px !important; height: 32px !important; line-height: 32px !important;
      color: #334155 !important;
      background: rgba(255,255,255,0.95) !important;
      backdrop-filter: blur(8px);
      border: none !important;
      font-size: 18px !important;
      transition: background 0.15s;
    }
    .leaflet-control-zoom a:hover { background: #fff !important; color: #6B9FFF !important; }
    .leaflet-control-zoom a:first-child { border-bottom: 1px solid rgba(0,0,0,0.06) !important; }

    .leaflet-control-attribution {
      background: rgba(255,255,255,0.7) !important;
      color: #94a3b8 !important;
      border-radius: 8px 0 0 0;
      font-size: 10px;
    }
    .leaflet-control-attribution a { color: #cbd5e1 !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var mapInstance = null;
    var markerGroup = null;

    /* ── Send event to parent React app ─────────────────────────── */
    function notify(data) {
      try { window.parent.postMessage(JSON.stringify(data), '*'); } catch(e) {}
    }

    /* ── (Re)initialise the map with fresh data ──────────────────── */
    function initMap(cities, roommates, apts, filter) {

      /* Create map once */
      if (!mapInstance) {
        mapInstance = L.map('map', {
          center: [51.0, 9.0], zoom: 4,
          zoomControl: true,
          scrollWheelZoom: false,   // plain scroll = page scroll, never zoom
          doubleClickZoom: true,
          touchZoom: true,          // two-finger pinch on touchscreens
          zoomSnap: 0,              // smooth fractional zoom for trackpad pinch
        });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
          subdomains: 'abcd', maxZoom: 19,
        }).addTo(mapInstance);
        markerGroup = L.layerGroup().addTo(mapInstance);

        /* Move +/- to the top-right so the legend (top-left) never covers it */
        mapInstance.zoomControl.setPosition('topright');

        /* Trackpad pinch-to-zoom (fingers together/apart) and ctrl+scroll.
           Browsers deliver a trackpad pinch as a wheel event with ctrlKey set,
           so we only zoom then — a normal scroll bubbles up and scrolls the page. */
        mapInstance.getContainer().addEventListener('wheel', function(e) {
          if (!e.ctrlKey) return;
          e.preventDefault();
          var point = mapInstance.mouseEventToContainerPoint(e);
          var newZoom = mapInstance.getZoom() - e.deltaY * 0.01;
          mapInstance.setZoomAround(point, newZoom, { animate: false });
        }, { passive: false });
      } else {
        markerGroup.clearLayers();
      }

      /* ── City labels + ghost dots ──────────────────────────────── */
      cities.forEach(function(city) {
        /* City name label */
        var labelIcon = L.divIcon({
          className: 'city-label',
          html: city.name,
          iconAnchor: [-7, -1],
        });
        markerGroup.addLayer(
          L.marker([city.lat, city.lng], { icon: labelIcon, interactive: false })
        );

        /* Ghost dot for cities with no visible pins */
        var hasRoommates = roommates.some(function(r) { return r.city === city.name; });
        var hasApts      = apts.some(function(a)      { return a.city === city.name; });
        var needsGhost   = (filter === 'roommates'  && !hasRoommates)
                        || (filter === 'apartments' && !hasApts)
                        || (filter === 'all'        && !hasRoommates && !hasApts);

        if (!needsGhost) return;

        var ghostIcon = L.divIcon({
          className: '',
          html: '<div style="width:11px;height:11px;background:rgba(100,116,139,0.18);border:1.5px solid rgba(100,116,139,0.35);border-radius:50%;cursor:pointer;transition:all 0.2s ease;" onmouseover="this.style.background=\'rgba(100,116,139,0.4)\';this.style.transform=\'scale(1.35)\'" onmouseout="this.style.background=\'rgba(100,116,139,0.18)\';this.style.transform=\'scale(1)\'"></div>',
          iconSize: [11, 11], iconAnchor: [5.5, 5.5],
        });
        var ghost = L.marker([city.lat, city.lng], { icon: ghostIcon });
        ghost.on('click', function() {
          notify({
            type: 'pin-click', pinType: 'city',
            cityName: city.name, cityFlag: city.flag, cityCountry: city.country,
            roommateCount: city.roommateCount, apartmentCount: city.apartmentCount,
          });
        });
        markerGroup.addLayer(ghost);
      });

      /* ── Blue pins: Roommate seekers ────────────────────────────── */
      roommates.forEach(function(r) {
        var bluePin = L.divIcon({
          className: '',
          html: '<div style="width:16px;height:16px;background:radial-gradient(circle at 35% 30%,#8FB6FF,#6B9FFF 70%);border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(107,159,255,0.25),0 3px 8px rgba(15,23,42,0.35);cursor:pointer;transition:transform 0.15s ease;" onmouseover="this.style.transform=\'scale(1.35)\'" onmouseout="this.style.transform=\'scale(1)\'"></div>',
          iconSize: [16, 16], iconAnchor: [8, 8],
        });
        var m = L.marker([r.lat, r.lng], { icon: bluePin });
        m.on('click', function() {
          notify({ type: 'pin-click', pinType: 'roommate', id: r.id });
        });
        markerGroup.addLayer(m);
      });

      /* ── Red pins: Apartment listings ───────────────────────────── */
      apts.forEach(function(a) {
        var redPin = L.divIcon({
          className: '',
          html: '<div style="width:16px;height:16px;background:radial-gradient(circle at 35% 30%,#FCA5A5,#F87171 70%);border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(248,113,113,0.25),0 3px 8px rgba(15,23,42,0.35);cursor:pointer;transition:transform 0.15s ease;" onmouseover="this.style.transform=\'scale(1.35)\'" onmouseout="this.style.transform=\'scale(1)\'"></div>',
          iconSize: [16, 16], iconAnchor: [8, 8],
        });
        var m = L.marker([a.lat, a.lng], { icon: redPin });
        m.on('click', function() {
          notify({ type: 'pin-click', pinType: 'apartment', id: a.id });
        });
        markerGroup.addLayer(m);
      });
    }

    /* ── Listen for data sent by HousingMap.tsx ─────────────────── */
    window.addEventListener('message', function(e) {
      try {
        var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (data && data.type === 'init-map') {
          initMap(data.cities, data.roommates, data.apts, data.filter);
        }
      } catch(err) {}
    });

    /* ── Tell the parent we're ready ────────────────────────────── */
    notify({ type: 'map-ready' });
  </script>
</body>
</html>
